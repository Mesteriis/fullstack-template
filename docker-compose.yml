services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: fullstack_template
      POSTGRES_PASSWORD: fullstack_template
      POSTGRES_DB: fullstack_template
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fullstack_template -d fullstack_template"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: backend
    env_file:
      - path: ./.env
        required: false
      - path: ./.env.example
        required: false
    environment:
      API__HOST: 0.0.0.0
      API__PORT: 8000
      DB__POSTGRES_DSN: postgresql+asyncpg://fullstack_template:fullstack_template@postgres:5432/fullstack_template
      DB__REDIS_URL: redis://redis:6379/0
      RUN_DB_MIGRATIONS: ${RUN_DB_MIGRATIONS:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: frontend
      args:
        APP__NAME: ${APP__NAME:-Fullstack Template API}
        APP__VERSION: ${APP__VERSION:-0.1.0}
        APP__ENVIRONMENT: ${APP__ENVIRONMENT:-local}
        OBSERVABILITY__ENABLED: ${OBSERVABILITY__ENABLED:-true}
        OBSERVABILITY__ENVIRONMENT: ${OBSERVABILITY__ENVIRONMENT:-}
        OBSERVABILITY__SERVICE_NAME: ${OBSERVABILITY__SERVICE_NAME:-}
        OBSERVABILITY__SENTRY_ENABLED: ${OBSERVABILITY__SENTRY_ENABLED:-false}
        OBSERVABILITY__GLITCHTIP_DSN: ${OBSERVABILITY__GLITCHTIP_DSN:-}
        OBSERVABILITY__TRACES_ENABLED: ${OBSERVABILITY__TRACES_ENABLED:-false}
        OBSERVABILITY__OTLP_ENDPOINT: ${OBSERVABILITY__OTLP_ENDPOINT:-}
        OBSERVABILITY__TRACE_SAMPLE_RATE: ${OBSERVABILITY__TRACE_SAMPLE_RATE:-0.1}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_DEV_PROXY_TARGET: ${VITE_DEV_PROXY_TARGET:-http://127.0.0.1:8000}
        VITE_OBSERVABILITY_WEB_VITALS_ENABLED: ${VITE_OBSERVABILITY_WEB_VITALS_ENABLED:-false}
        VITE_OBSERVABILITY_UI_TELEMETRY_ENABLED: ${VITE_OBSERVABILITY_UI_TELEMETRY_ENABLED:-false}
        VITE_OBSERVABILITY_ROUTER_TELEMETRY_ENABLED: ${VITE_OBSERVABILITY_ROUTER_TELEMETRY_ENABLED:-true}
        VITE_OBSERVABILITY_REQUEST_CORRELATION_ENABLED: ${VITE_OBSERVABILITY_REQUEST_CORRELATION_ENABLED:-true}
        VITE_OBSERVABILITY_SOURCEMAPS_ENABLED: ${VITE_OBSERVABILITY_SOURCEMAPS_ENABLED:-false}
    environment:
      BACKEND_UPSTREAM: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:8080"

volumes:
  postgres-data:
  redis-data:
