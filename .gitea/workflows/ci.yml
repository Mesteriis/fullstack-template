name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - "feature/**"

jobs:
  backend:
    runs-on: python
    steps:
      - uses: actions/checkout@v6

      - name: Sync backend dependencies
        run: make backend-sync

      - name: Check template invariants
        run: make check

      - name: Lint backend
        run: make backend-lint

      - name: Type-check backend
        run: make backend-types

      - name: Test backend
        run: make backend-test

      - name: Security-check backend
        run: make backend-security

  frontend:
    runs-on: node
    needs:
      - backend
    steps:
      - uses: actions/checkout@v6

      - name: Install frontend dependencies
        run: make frontend-install

      - name: Lint frontend
        run: make frontend-lint

      - name: Type-check frontend
        run: make frontend-types

      - name: Test frontend
        run: make frontend-test

      - name: Build frontend
        run: make frontend-build

  security-and-images:
    runs-on: main
    needs:
      - frontend
    steps:
      - uses: actions/checkout@v6

      - name: Lint repository assets
        run: make repo-lint

      - name: Run trivy filesystem scan
        run: make repo-security

      - name: Build and tag container images
        run: make docker-build
