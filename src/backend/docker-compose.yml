services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: fullstack_template
      POSTGRES_PASSWORD: fullstack_template
      POSTGRES_DB: fullstack_template
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fullstack_template -d fullstack_template"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
      target: backend
    env_file:
      - path: ../../.env
        required: false
      - path: ../../.env.example
        required: false
    environment:
      API__HOST: 0.0.0.0
      API__PORT: 8000
      DB__POSTGRES_DSN: postgresql+asyncpg://fullstack_template:fullstack_template@postgres:5432/fullstack_template
      DB__REDIS_URL: redis://redis:6379/0
      RUN_DB_MIGRATIONS: ${RUN_DB_MIGRATIONS:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"

volumes:
  postgres-data:
  redis-data:
