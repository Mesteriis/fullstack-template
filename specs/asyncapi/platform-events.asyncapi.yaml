asyncapi: 2.6.0
info:
  title: Maximum Platform Template Events
  version: 0.1.0
channels:
  system.health.changed:
    publish:
      message:
        $ref: "#/components/messages/SystemHealthChanged"
components:
  messages:
    SystemHealthChanged:
      name: SystemHealthChanged
      payload:
        type: object
        additionalProperties: false
        required:
          - status
          - service
        properties:
          status:
            type: string
          service:
            type: string
